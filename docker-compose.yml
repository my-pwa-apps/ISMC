services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/data/ismc.db
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - AUTH_SECRET=${AUTH_SECRET:?Set AUTH_SECRET in .env}
      - AUTH_ENTRA_TENANT_ID=${AUTH_ENTRA_TENANT_ID:?Set AUTH_ENTRA_TENANT_ID in .env}
      - AUTH_ENTRA_CLIENT_ID=${AUTH_ENTRA_CLIENT_ID:?Set AUTH_ENTRA_CLIENT_ID in .env}
      - AUTH_ENTRA_CLIENT_SECRET=${AUTH_ENTRA_CLIENT_SECRET:?Set AUTH_ENTRA_CLIENT_SECRET in .env}
      - NEXT_PUBLIC_ENABLE_MOCK=${NEXT_PUBLIC_ENABLE_MOCK:-false}
      - ENABLE_WRITE_OPERATIONS=${ENABLE_WRITE_OPERATIONS:-false}
    volumes:
      - appdata:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  appdata:
