services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://intune:intune@db:5432/intune_gpmc
      - NEXTAUTH_URL=http://localhost:3000
      # Copy remaining vars from .env.example
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: intune
      POSTGRES_PASSWORD: intune
      POSTGRES_DB: intune_gpmc
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intune -d intune_gpmc"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
