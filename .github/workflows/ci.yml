name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx next lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run Vitest
        run: npm run test -- --reporter=verbose

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck, unit-tests]
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      # Dummy values so Next.js build doesn't fail on env var validation
      AUTH_SECRET: "ci-build-secret-placeholder"
      AUTH_ENTRA_TENANT_ID: "00000000-0000-0000-0000-000000000000"
      AUTH_ENTRA_CLIENT_ID: "00000000-0000-0000-0000-000000000000"
      AUTH_ENTRA_CLIENT_SECRET: "ci-placeholder"
      DATABASE_URL: "file:./dev.db"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXT_PUBLIC_ENABLE_MOCK: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 7

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    env:
      NEXT_PUBLIC_ENABLE_MOCK: "true"
      AUTH_SECRET: "ci-e2e-secret"
      AUTH_ENTRA_TENANT_ID: "00000000-0000-0000-0000-000000000000"
      AUTH_ENTRA_CLIENT_ID: "00000000-0000-0000-0000-000000000000"
      AUTH_ENTRA_CLIENT_SECRET: "ci-placeholder"
      DATABASE_URL: "file:./dev.db"
      NEXTAUTH_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client + migrate
        run: |
          npx prisma generate
          npx prisma migrate deploy || npx prisma db push

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next/

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: intune-gpmc:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
